<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagraoBet Sniper - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b161b;
            color: #e4e4e4;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        
        .game-row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1e2d35;
            padding: 8px 10px;
            gap: 8px;
            width: 100%;
        }
        
        .btn-bet {
            transition: all 0.1s;
            border: 1px solid #2d3d46;
            background: #1e2d35;
            color: #a0a0a0;
            font-weight: 800;
            font-size: 0.8rem;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            flex: 1;
        }

        .btn-bet.active-win { background-color: #00c853 !important; color: white !important; border-color: #00c853 !important; box-shadow: 0 0 10px rgba(0,200,83,0.2); }
        .btn-bet.active-draw { background-color: #ffab00 !important; color: white !important; border-color: #ffab00 !important; box-shadow: 0 0 10px rgba(255,171,0,0.2); }

        .star-icon { cursor: pointer; flex-shrink: 0; transition: transform 0.2s; }
        .star-active { color: #ffab00; transform: scale(1.1); }

        .truncate-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .team-shield {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 900;
            color: white;
            flex-shrink: 0;
            background: linear-gradient(135deg, #2d3d46 0%, #1e2d35 100%);
            border: 1px solid #3d4d56;
        }

        /* Acordeão Estilo Flashscore */
        summary { list-style: none; cursor: pointer; }
        summary::-webkit-details-marker { display: none; }
        details[open] summary { border-bottom: 1px solid #1e2d35; padding-bottom: 8px; margin-bottom: 8px; }

        @media (max-width: 640px) {
            .game-time { font-size: 0.65rem; min-width: 35px; text-align: center; }
            .team-name { font-size: 0.8rem; line-height: 1.2; max-width: 90px; }
            .btn-bet { font-size: 0.75rem; height: 32px; }
            .game-row { gap: 6px; padding: 8px 6px; }
        }

        .loader {
            border: 3px solid #1e2d35;
            border-radius: 50%;
            border-top: 3px solid #00c853;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn-used { opacity: 0.3 !important; filter: grayscale(0.8); pointer-events: none; }
        .btn-processing { opacity: 0.5 !important; transition: opacity 0.2s; }
    </style>
</head>
<body class="p-2 sm:p-4">

    <div class="max-w-2xl mx-auto">
        <!-- HEADER -->
        <header class="text-center mb-4">
            <h1 class="text-xl font-black text-white flex items-center justify-center gap-2 tracking-tighter uppercase">
                🎯 MAGRAOBET <span class="text-[10px] bg-green-600 px-2 py-0.5 rounded italic">Sniper Pro V2.8</span>
            </h1>
            <div id="testModeBadge" class="hidden mt-1">
                <span class="text-[9px] bg-blue-600/20 text-blue-400 border border-blue-500/30 px-3 py-0.5 rounded-full font-bold uppercase tracking-widest">Modo Teste Ativo</span>
            </div>
        </header>

        <!-- CONFIG CARD -->
        <div class="bg-[#121e24] p-4 rounded-xl border border-[#1e2d35] mb-4 shadow-xl">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="flex items-center gap-2 bg-[#1e2d35] rounded border border-[#2d3d46] px-3 py-2">
                    <label class="text-[9px] uppercase text-gray-500 font-black">Invest R$</label>
                    <input type="number" id="investValue" value="50" class="w-full bg-transparent text-sm text-white font-bold outline-none">
                </div>
                <div class="flex items-center gap-2 bg-[#1e2d35] rounded border border-[#2d3d46] px-3 py-2">
                    <label class="text-[9px] uppercase text-gray-500 font-black">Bilhetes</label>
                    <input type="number" id="ticketQty" value="10" class="w-full bg-transparent text-sm text-white font-bold outline-none">
                </div>
            </div>
            <div class="flex gap-2">
                <div class="flex flex-1 gap-1">
                    <button onclick="setPeriod(3)" id="p3" class="period-btn flex-1 bg-green-600 text-white font-bold py-2 rounded text-xs">3D</button>
                    <button onclick="setPeriod(4)" id="p4" class="period-btn flex-1 bg-[#1e2d35] text-gray-400 font-bold py-2 rounded text-xs">4D</button>
                    <button onclick="setPeriod(5)" id="p5" class="period-btn flex-1 bg-[#1e2d35] text-gray-400 font-bold py-2 rounded text-xs">5D</button>
                </div>
                <button onclick="resetAllSelections()" class="px-4 bg-red-900/30 hover:bg-red-900/50 text-red-400 border border-red-900/50 rounded text-[10px] font-black uppercase transition-all">
                    Reiniciar
                </button>
            </div>
        </div>

        <!-- LEGENDA -->
        <div class="flex items-center justify-between px-2 mb-2 py-1 bg-[#0b161b] border-x border-[#1e2d35]">
            <div class="flex gap-3 text-[8px] uppercase font-bold tracking-wider text-gray-400">
                <span><span class="text-[#ffab00]">⭐</span> ÂNCORA (FIXO)</span>
                <span><span class="text-red-500 font-bold">🗑️</span> OFF</span>
            </div>
            <div class="text-[8px] text-gray-500 font-bold" id="gameCount">0 JOGOS ATIVOS</div>
        </div>

        <!-- LOADING -->
        <div id="loading" class="flex flex-col items-center justify-center py-10">
            <div class="loader mb-2"></div>
            <span class="text-[10px] text-gray-500 uppercase font-black tracking-widest">Sincronizando...</span>
        </div>

        <!-- ERRO -->
        <div id="errorDisplay" class="hidden bg-red-900/20 border border-red-500/50 p-4 rounded-lg mb-4 text-center">
            <p class="text-xs text-red-400 font-bold mb-2" id="errorMessage">Erro de rede</p>
            <div class="flex gap-2 justify-center">
                <button onclick="fetchOdds()" class="text-[10px] bg-red-500 text-white px-4 py-2 rounded font-bold uppercase tracking-widest">🔄 Tentar Novamente</button>
            </div>
        </div>

        <!-- LISTA DE JOGOS -->
        <div id="gameList" class="bg-[#121e24] rounded-t-xl border border-[#1e2d35] shadow-2xl"></div>

        <!-- BOTÃO GERAR -->
        <button onclick="generateMatrix()" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-b-xl shadow-lg transition-all active:scale-95 uppercase tracking-widest text-sm mb-6">
            🚀 Gerar Bilhetes Sniper
        </button>

        <!-- LIXEIRA -->
        <div id="excludedSection" class="hidden mt-6 mb-8">
            <h3 class="text-[9px] text-gray-600 font-black uppercase mb-2 ml-2 tracking-widest">🗑️ Jogos Removidos (Restaurar)</h3>
            <div id="excludedList" class="flex flex-wrap gap-2 px-2"></div>
        </div>

        <!-- RESULTADOS -->
        <div id="results" class="mt-4 space-y-4"></div>

        <!-- HISTÓRICO -->
        <div id="historySection" class="mt-12 pb-24">
            <details class="group">
                <summary class="flex items-center justify-center gap-2 text-xs font-black text-gray-500 uppercase tracking-[0.2em] border-b border-[#1e2d35] pb-2 mb-4">
                    <span>📂 Histórico de Apostas</span>
                    <svg class="w-4 h-4 transition-transform group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M19 9l-7 7-7-7" stroke-width="2"/></svg>
                </summary>
                <div id="historyList" class="space-y-3"></div>
                <div id="emptyHistory" class="text-center py-8 text-gray-700 italic text-xs">Nenhum histórico disponível.</div>
            </details>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-2 rounded-full font-bold text-xs shadow-2xl transition-all opacity-0 pointer-events-none z-50">Salvo!</div>

    <script>
        const API_KEY = "382e534fa4dfaa17600726e74b847a4e";
        let allGames = [];
        let selections = {}; 
        let anchors = new Set();
        let excludedGames = new Set();
        let currentPeriod = 3;
        let generatedTickets = []; 

        window.onload = () => { 
            const isLocal = window.location.hostname === "localhost" || window.location.protocol === "file:";
            if (isLocal) {
                document.getElementById('testModeBadge').classList.remove('hidden');
                useMockData();
            } else {
                fetchOdds();
            }
            renderHistory();
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 2000);
        }

        function resetAllSelections() {
            selections = {};
            anchors.clear();
            excludedGames.clear();
            generatedTickets = [];
            document.getElementById('results').innerHTML = '';
            allGames.forEach(g => selections[g.id] = ["1"]);
            renderGames();
        }

        function setPeriod(d) {
            currentPeriod = d;
            document.querySelectorAll('.period-btn').forEach(b => {
                b.classList.replace('bg-green-600', 'bg-[#1e2d35]');
                b.classList.replace('text-white', 'text-gray-400');
            });
            const btn = document.getElementById('p' + d);
            btn.classList.replace('bg-[#1e2d35]', 'bg-green-600');
            btn.classList.replace('text-gray-400', 'text-white');
            renderGames();
        }

        async function fetchOdds() {
            const list = document.getElementById('gameList');
            const errorDiv = document.getElementById('errorDisplay');
            const loader = document.getElementById('loading');
            errorDiv.classList.add('hidden');
            loader.classList.remove('hidden');
            list.innerHTML = '';
            try {
                const url = `https://api.the-odds-api.com/v4/sports/soccer_brazil_campeonato/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h&oddsFormat=decimal`;
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                allGames = await response.json();
                allGames.forEach(g => selections[g.id] = ["1"]);
                renderGames();
            } catch (error) {
                errorDiv.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        }

        function useMockData() {
            document.getElementById('loading').classList.add('hidden');
            const times = ["Flamengo", "Palmeiras", "Botafogo", "Vasco", "Corinthians", "São Paulo", "Grêmio", "Internacional", "Atlético-MG", "Cruzeiro"];
            const mock = [];
            for (let i = 1; i <= 10; i++) {
                let t1 = times[Math.floor(Math.random()*times.length)];
                let t2 = times.filter(t => t !== t1)[Math.floor(Math.random()*(times.length-1))];
                mock.push({
                    id: `m_${i}`, home_team: t1, away_team: t2,
                    commence_time: new Date(Date.now() + (i * 14400000)).toISOString(),
                    bookmakers: [{ markets: [{ outcomes: [{name: t1, price: (1.5 + Math.random()).toFixed(2)}, {name: t2, price: (2.5 + Math.random()).toFixed(2)}, {name: "Draw", price: 3.10}] }] }]
                });
            }
            allGames = mock;
            allGames.forEach(g => selections[g.id] = ["1"]);
            renderGames();
        }

        function getShield(name) { return name.substring(0, 2).toUpperCase(); }

        function renderGames() {
            const list = document.getElementById('gameList');
            const exclSection = document.getElementById('excludedSection');
            const exclList = document.getElementById('excludedList');
            list.innerHTML = ''; exclList.innerHTML = '';
            const now = new Date();
            const limit = new Date();
            limit.setDate(now.getDate() + currentPeriod);
            const filtered = allGames.filter(g => new Date(g.commence_time) > now && new Date(g.commence_time) <= limit);
            
            let count = 0;
            filtered.forEach(game => {
                if (excludedGames.has(game.id)) {
                    const b = document.createElement('div');
                    b.onclick = () => { excludedGames.delete(game.id); renderGames(); };
                    b.className = "bg-[#1e2d35] border border-[#2d3d46] px-2 py-1 rounded text-[8px] font-bold text-gray-500 cursor-pointer uppercase flex items-center gap-1";
                    b.innerHTML = `<span>+</span> ${game.home_team} x ${game.away_team}`;
                    exclList.appendChild(b);
                    return;
                }
                count++;
                const dt = new Date(game.commence_time);
                const isAnchor = anchors.has(game.id);
                const row = document.createElement('div');
                row.className = 'game-row';
                row.innerHTML = `
                    <div onclick="toggleAnchor('${game.id}')" class="star-icon ${isAnchor ? 'star-active' : 'text-gray-700'}">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"/></svg>
                    </div>
                    <div class="game-time">
                        <div class="font-black text-gray-400 text-[9px]">${dt.getDate()}/${dt.getMonth()+1}</div>
                        <div class="text-[8px] text-gray-600 font-bold">${dt.getHours()}:${dt.getMinutes().toString().padStart(2, '0')}</div>
                    </div>
                    <div class="flex-1 min-w-0 flex flex-col gap-0.5">
                        <div class="flex items-center gap-2">
                            <div class="team-shield">${getShield(game.home_team)}</div>
                            <div class="team-name truncate-name font-bold ${isAnchor ? 'text-green-500' : 'text-white'}">${game.home_team}</div>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="team-shield">${getShield(game.away_team)}</div>
                            <div class="team-name truncate-name font-bold ${isAnchor ? 'text-green-500' : 'text-white'}">${game.away_team}</div>
                        </div>
                    </div>
                    <div class="flex gap-1 w-[40%] sm:w-[32%]">
                        <button onclick="toggleBet('${game.id}', '1')" class="btn-bet ${selections[game.id].includes('1') ? 'active-win' : ''}">1</button>
                        <button onclick="toggleBet('${game.id}', 'X')" class="btn-bet ${selections[game.id].includes('X') ? 'active-draw' : ''}">X</button>
                        <button onclick="toggleBet('${game.id}', '2')" class="btn-bet ${selections[game.id].includes('2') ? 'active-win' : ''}">2</button>
                    </div>
                    <div onclick="removeGame('${game.id}')" class="text-red-700/60 hover:text-red-500 cursor-pointer ml-1">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </div>
                `;
                list.appendChild(row);
            });
            document.getElementById('gameCount').innerText = `${count} JOGOS ATIVOS`;
            if (excludedGames.size > 0) exclSection.classList.remove('hidden'); else exclSection.classList.add('hidden');
        }

        function toggleAnchor(id) { 
            if (anchors.has(id)) anchors.delete(id); else { anchors.add(id); selections[id] = [selections[id][0]]; }
            renderGames(); 
        }
        function toggleBet(id, v) { 
            if (anchors.has(id)) selections[id] = [v]; 
            else { 
                let c = selections[id]; 
                if (c.includes(v)) { if (c.length > 1) selections[id] = c.filter(x => x !== v); } 
                else selections[id].push(v); 
            } 
            renderGames(); 
        }
        function removeGame(id) { excludedGames.add(id); anchors.delete(id); renderGames(); }

        function generateMatrix() {
            if (anchors.size === 0) { alert("Selecione ao menos uma ÂNCORA."); return; }
            const invTotal = parseFloat(document.getElementById('investValue').value);
            const qtyReq = parseInt(document.getElementById('ticketQty').value);
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="text-center py-6"><div class="loader mx-auto"></div></div>';
            
            const anc_data = []; const var_data = [];
            allGames.forEach(game => {
                if (excludedGames.has(game.id)) return;
                const sels = selections[game.id]; if (!sels) return;
                let odds = { "1": 2.0, "X": 3.0, "2": 2.0 };
                try {
                    const mk = game.bookmakers[0].markets[0].outcomes;
                    odds["1"] = parseFloat(mk.find(o => o.name === game.home_team).price);
                    odds["2"] = parseFloat(mk.find(o => o.name === game.away_team).price);
                    odds["X"] = parseFloat(mk.find(o => o.name === 'Draw').price);
                } catch(e) {}
                if (anchors.has(game.id)) anc_data.push({ j: `${game.home_team} x ${game.away_team}`, r: sels[0], o: odds[sels[0]] });
                else var_data.push(sels.map(s => ({ j: `${game.home_team} x ${game.away_team}`, r: s, o: odds[s] })));
            });

            const cartesian = (...a) => a.reduce((a, b) => a.flatMap(d => b.map(e => [d, e].flat())));
            let combos = var_data.length > 0 ? cartesian(...var_data) : [[]];
            const total = combos.length;
            const finalQty = Math.min(total, qtyReq);
            combos = combos.sort(() => 0.5 - Math.random()).slice(0, finalQty);
            const stake = invTotal / combos.length;

            generatedTickets = combos.map((combo, idx) => {
                let oddT = anc_data.reduce((acc, c) => acc * c.o, 1);
                const comboItems = Array.isArray(combo) ? combo : [combo];
                const gamesArr = [...anc_data.map(a => ({...a, type: 'FIXO'})), ...comboItems.map(v => ({...v, type: 'VAR'}))];
                gamesArr.forEach(g => { if(g.type === 'VAR') oddT *= g.o });
                return { id: idx, odd: oddT, stake: stake, games: gamesArr, isSaved: false };
            });

            renderTickets(resultsDiv, finalQty, total);
        }

        function renderTickets(container, x, y) {
            container.innerHTML = `<h2 class="font-black text-white mb-3 uppercase text-[10px] text-center">Gerados ${x} bilhetes de ${y} possíveis</h2>`;
            generatedTickets.forEach((t, i) => {
                const card = document.createElement('details'); 
                card.className = "bg-[#121e24] border border-[#1e2d35] rounded-xl mb-3 overflow-hidden group";
                let rows = t.games.map(g => `<tr><td class="py-1 text-[10px] ${g.type === 'FIXO' ? 'text-white' : 'text-gray-400'} font-bold truncate-name">${g.j}</td><td class="text-[10px] font-black text-right text-white uppercase">${g.r}</td></tr>`).join('');
                card.innerHTML = `
                    <summary class="p-3 flex justify-between items-center">
                        <span class="text-[9px] font-black text-green-500 uppercase italic">BILHETE #${i+1}</span>
                        <span class="text-[10px] text-white font-bold tracking-tight">RETORNO: <b class="text-green-500">R$ ${(t.stake*t.odd).toFixed(2)}</b></span>
                    </summary>
                    <div class="px-3 pb-3">
                        <table class="w-full mb-3">${rows}</table>
                        <div class="flex gap-2 border-t border-[#1e2d35] pt-3">
                            <button onclick="saveTicketToHistory(${i})" id="s-${i}" class="flex-1 bg-blue-600 text-white py-2 rounded text-[9px] font-black uppercase transition-all ${t.isSaved ? 'btn-used' : ''}">
                                ${t.isSaved ? 'Salvo' : 'Salvar Bet'}
                            </button>
                            <button onclick="shareTicket(${i})" id="z-${i}" class="flex-1 bg-green-600 text-white py-2 rounded text-[9px] font-black uppercase transition-all">
                                Zap
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function shareTicket(idx) {
            const btn = document.getElementById(`z-${idx}`);
            btn.classList.add('btn-processing');
            setTimeout(() => btn.classList.remove('btn-processing'), 1500);
            const t = generatedTickets[idx];
            let text = `🎯 *MAGRAOBET SNIPER*\n\n🎫 *BILHETE #${idx+1}*\n`;
            t.games.forEach(g => text += `${g.type === 'FIXO' ? '⭐' : '🔹'} ${g.j}: *${g.r}*\n`);
            text += `\n📈 Odd: ${t.odd.toFixed(2)}\n💰 Invest: R$ ${t.stake.toFixed(2)}\n💵 Ganho: R$ ${(t.stake*t.odd).toFixed(2)}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function saveTicketToHistory(idx) {
            const t = generatedTickets[idx];
            if (t.isSaved) return;
            const h = JSON.parse(localStorage.getItem('magraobet_history') || '[]');
            h.unshift({...t, date: new Date().toISOString()});
            localStorage.setItem('magraobet_history', JSON.stringify(h.slice(0,50)));
            t.isSaved = true;
            const btn = document.getElementById(`s-${idx}`);
            btn.classList.add('btn-used');
            btn.innerText = 'Salvo';
            showToast("Salvo no Histórico!");
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const h = JSON.parse(localStorage.getItem('magraobet_history') || '[]');
            if (h.length === 0) return;
            document.getElementById('emptyHistory').classList.add('hidden');
            list.innerHTML = '';
            h.forEach((t, i) => {
                const card = document.createElement('details');
                card.className = "bg-[#0b161b] border border-[#1e2d35] rounded-lg mb-2 group";
                card.innerHTML = `
                    <summary class="p-3 flex justify-between items-center text-[8px] font-bold">
                        <span class="text-gray-500">${new Date(t.date).toLocaleString()}</span>
                        <div class="flex items-center gap-4">
                            <span class="text-green-500 text-[10px] font-black">R$ ${(t.stake*t.odd).toFixed(2)}</span>
                            <button onclick="deleteHistoryItem(${i})" class="text-red-500 hover:scale-125 transition-transform">✕</button>
                        </div>
                    </summary>
                    <div class="px-3 pb-3 text-[9px] text-gray-400">
                        ${t.games.map(g => `<div class="flex justify-between py-1 border-b border-[#1e2d35]/30"><span>${g.j}</span><span class="font-bold text-white">${g.r}</span></div>`).join('')}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function deleteHistoryItem(index) {
            const history = JSON.parse(localStorage.getItem('magraobet_history') || '[]');
            history.splice(index, 1);
            localStorage.setItem('magraobet_history', JSON.stringify(history));
            renderHistory();
        }
    </script>
</body>
</html>
