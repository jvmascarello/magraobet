<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M10BET SNIPER PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-green: #00e676;
            --brand-blue: #48cae4;
            --dark-bg: #050a0c;
            --card-bg: #0d1518;
            --border-muted: #1a2e38;
            --warning: #ffab00;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: #d1d5db;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        
        .game-row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-muted);
            padding: 14px 10px;
            gap: 12px;
            width: 100%;
            background: rgba(13, 21, 24, 0.5);
        }
        
        .btn-bet {
            transition: all 0.2s ease;
            border: 1px solid var(--border-muted);
            background: #142127;
            color: #9ca3af;
            font-weight: 700;
            font-size: 0.85rem;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            flex: 1;
        }

        .btn-bet.active-win { 
            background: var(--brand-green) !important; 
            color: #050a0c !important; 
            border-color: var(--brand-green) !important;
        }
        .btn-bet.active-draw { 
            background: var(--brand-blue) !important; 
            color: #050a0c !important; 
            border-color: var(--brand-blue) !important;
        }

        .star-icon { cursor: pointer; flex-shrink: 0; color: #1f2937; transition: transform 0.2s; }
        .star-active { color: #f59e0b !important; transform: scale(1.15); }

        .team-shield-img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            flex-shrink: 0;
        }

        summary { list-style: none; cursor: pointer; }
        summary::-webkit-details-marker { display: none; }
        
        .loader {
            border: 3px solid #142127;
            border-radius: 50%;
            border-top: 3px solid var(--brand-green);
            width: 28px;
            height: 28px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn-reset-ui {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 0 15px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-off { color: #374151; padding: 8px; }
        .btn-off:hover { color: #f87171; }

        .logo-header { width: 100%; max-width: 240px; margin: 0 auto; display: block; }

        .period-btn-active {
            background-color: var(--brand-green) !important;
            color: var(--dark-bg) !important;
            font-weight: 800 !important;
        }

        .ticket-card {
            background: #0d1518;
            border: 1px solid #1a2e38;
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .ticket-row td {
            padding: 10px 0;
            font-size: 11px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .text-anchor { font-weight: 800; color: var(--brand-green); }
        .text-sniper { color: #9ca3af; }

        /* Modal Alerta */
        #warningModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: #0d1518;
            border: 1px solid var(--warning);
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        input[type="checkbox"] {
            accent-color: var(--brand-green);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body class="p-2 sm:p-4">

    <!-- MODAL DE ALERTA DE ÂNCORA FALSA -->
    <div id="warningModal">
        <div class="modal-content">
            <div class="flex items-center gap-3 text-warning mb-4">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4m0 4h.01" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <h2 class="text-lg font-black uppercase tracking-tight">Âncora Falsa</h2>
            </div>
            <p class="text-xs text-gray-400 mb-5 leading-relaxed">
                Você definiu apenas <b class="text-white">1 resultado</b> para os jogos Sniper abaixo. Isso cria uma "Âncora Falsa" que impede a variação matemática da matriz:
            </p>
            <div id="fakeAnchorList" class="space-y-2 mb-6 max-h-32 overflow-y-auto pr-2"></div>
            <div class="flex gap-3">
                <button onclick="closeWarning()" class="flex-1 bg-[#1a2e38] text-gray-400 font-bold py-3 rounded-xl text-[10px] uppercase">Corrigir</button>
                <button onclick="forceGenerate()" class="flex-1 bg-warning text-black font-black py-3 rounded-xl text-[10px] uppercase">Gerar Assim Mesmo</button>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-6 pt-2">
            <img id="mainLogo" src="" alt="M10BET SNIPER PRO" class="logo-header">
            <div id="statusBadge" class="mt-4">
                <span id="modeLabel" class="text-[9px] bg-[#0d1518] text-gray-500 border border-[#1a2e38] px-4 py-1 rounded-full font-bold uppercase tracking-widest italic">Aguarde...</span>
            </div>
        </header>

        <div class="bg-[#0d1518] p-5 rounded-2xl border border-[#1a2e38] mb-4 shadow-2xl relative">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="flex flex-col gap-1 bg-[#142127] rounded-lg border border-[#1a2e38] p-3">
                    <label class="text-[8px] uppercase text-gray-500 font-black tracking-widest">Investimento</label>
                    <div class="flex items-center text-white font-bold"><span class="mr-1 text-gray-600">R$</span><input type="number" id="investValue" value="50" class="bg-transparent text-lg w-full outline-none"></div>
                </div>
                <div class="flex flex-col gap-1 bg-[#142127] rounded-lg border border-[#1a2e38] p-3">
                    <label class="text-[8px] uppercase text-gray-500 font-black tracking-widest">Qtd Bilhetes</label>
                    <input type="number" id="ticketQty" value="10" class="bg-transparent text-lg text-white font-bold outline-none">
                </div>
            </div>
            
            <div class="flex gap-2">
                <div class="flex flex-1 gap-1">
                    <button onclick="setPeriod(3)" id="p3" class="period-btn flex-1 bg-[#142127] text-gray-500 font-bold py-2.5 rounded-lg text-xs transition-all uppercase">3D</button>
                    <button onclick="setPeriod(4)" id="p4" class="period-btn flex-1 bg-[#142127] text-gray-500 font-bold py-2.5 rounded-lg text-xs transition-all uppercase">4D</button>
                    <button onclick="setPeriod(5)" id="p5" class="period-btn flex-1 bg-[#142127] text-gray-500 font-bold py-2.5 rounded-lg text-xs transition-all uppercase">5D</button>
                </div>
                <button onclick="resetAllSelections()" class="btn-reset-ui">Reset</button>
            </div>
        </div>

        <div class="flex items-center justify-between px-3 mb-3 py-1">
            <div class="text-[9px] uppercase font-bold text-gray-600">⭐ ÂNCORAS: <b id="anchorCount" class="text-white">0</b>/4</div>
            <div id="gameCount" class="text-[9px] text-gray-600 font-bold">---</div>
        </div>

        <div id="loading" class="flex justify-center py-10"><div class="loader"></div></div>

        <div id="gameList" class="bg-[#0d1518] rounded-2xl border border-[#1a2e38] shadow-2xl overflow-hidden mb-6"></div>

        <div class="flex flex-col gap-2 mb-8">
            <button onclick="validateBeforeGenerate()" class="w-full bg-white text-black font-black py-4 rounded-xl shadow-lg transition-all active:scale-95 uppercase text-sm tracking-widest">
                Gerar Bilhetes Sniper
            </button>
            <div class="flex gap-2">
                <button id="shareAllBtn" onclick="shareAllTickets()" class="hidden flex-1 bg-[#142127] border border-[#1a2e38] text-gray-400 font-bold py-3 rounded-xl text-[10px] uppercase tracking-widest">WhatsApp Matriz</button>
                <button id="bet365Btn" onclick="openBet365()" class="hidden flex-1 bg-[#142127] border border-[#1a2e38] text-[#00e676] font-bold py-3 rounded-xl text-[10px] uppercase tracking-widest">Abrir Bet365</button>
            </div>
        </div>

        <div id="excludedSection" class="hidden mb-10 bg-[#0d1518] p-4 rounded-xl border border-dashed border-[#1a2e38]">
            <h3 class="text-[8px] text-gray-500 font-black uppercase mb-3 tracking-widest">🗑️ Jogos Removidos (Clique para restaurar)</h3>
            <div id="excludedList" class="flex flex-wrap gap-2"></div>
        </div>

        <div id="results" class="mt-6"></div>

        <div class="mt-14 pb-32 border-t border-[#1a2e38] pt-8">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-[11px] font-black text-gray-400 uppercase tracking-[0.2em]">📂 Histórico Sniper</h3>
                <div class="flex gap-2">
                    <button onclick="clearFullHistory()" class="bg-red-900/30 text-red-500 text-[8px] font-black px-3 py-1.5 rounded-full uppercase border border-red-900/50">Limpar Histórico</button>
                    <button id="shareSelectedBtn" onclick="shareSelectedHistory()" class="hidden bg-[#00e676] text-black text-[9px] font-black px-4 py-1.5 rounded-full uppercase transition-all shadow-lg active:scale-95">WhatsApp Seleção</button>
                </div>
            </div>
            <div id="historyList" class="space-y-4"></div>
            <div id="emptyHistory" class="text-center py-12 text-gray-700 italic text-[10px] uppercase tracking-widest">Histórico Vazio.</div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white text-black px-8 py-3 rounded-full font-black text-[10px] uppercase shadow-2xl opacity-0 transition-all z-50 pointer-events-none">OK!</div>

    <script>
        const API_KEY = "382e534fa4dfaa17600726e74b847a4e";
        const GITHUB_USER = "jvmascarello"; 
        const GITHUB_REPO = "magraobet"; 
        const GITHUB_BRANCH = "escudos"; 
        const HISTORY_KEY = "m10bet_history_v4.8";

        let allGames = [];
        let selections = {}; 
        let anchors = new Set();
        let excludedGames = new Set();
        let currentPeriod = 3;
        let generatedTickets = []; 

        window.onload = () => { 
            document.getElementById('mainLogo').src = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/m10bet-logo.png`;
            fetchOdds();
            renderHistory();
            setPeriod(3);
        };

        const slugify = (text) => text.toString().toLowerCase().trim()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .replace(/\s+/g, '-')
            .replace(/[^\w\-]+/g, '')
            .replace(/\-\-+/g, '-');

        function getShieldUrl(name) {
            let slug = slugify(name);
            if (slug === "atletico-mineiro") slug = "ateltico-mineiro"; 
            if (slug === "gremio") slug = "gremio"; 
            return `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${slug}.png`;
        }

        async function fetchOdds() {
            try {
                const url = `https://api.the-odds-api.com/v4/sports/soccer_brazil_campeonato/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h&oddsFormat=decimal`;
                const response = await fetch(url);
                allGames = await response.json();
                allGames.forEach(g => selections[g.id] = ["1"]);
                document.getElementById('modeLabel').innerText = "CONECTADO";
                renderGames();
            } catch (e) {
                document.getElementById('modeLabel').innerText = "MODO TESTE";
                useMockData();
            } finally { document.getElementById('loading').classList.add('hidden'); }
        }

        function useMockData() {
            const times = ["Flamengo", "Palmeiras", "Botafogo", "Vasco", "Corinthians", "São Paulo", "Grêmio", "Internacional", "Atlético Mineiro", "Cruzeiro", "Bahia", "Fluminense"];
            const mock = [];
            for (let i = 1; i <= 20; i++) {
                let t1 = times[Math.floor(Math.random()*times.length)];
                let t2 = times.filter(t => t !== t1)[Math.floor(Math.random()*(times.length-1))];
                mock.push({
                    id: `m_${i}`, home_team: t1, away_team: t2,
                    commence_time: new Date(Date.now() + (Math.random() * 120 * 3600000)).toISOString(),
                    bookmakers: [{ markets: [{ outcomes: [{name: t1, price: 1.8}, {name: t2, price: 3.4}, {name: "Draw", price: 3.1}] }] }]
                });
            }
            allGames = mock.sort((a,b) => new Date(a.commence_time) - new Date(b.commence_time));
            allGames.forEach(g => selections[g.id] = ["1"]);
            renderGames();
        }

        function getManipulatedCount() {
            return Object.keys(selections).filter(id => {
                const s = selections[id] || ["1"];
                const isDefault = s.length === 1 && s[0] === "1";
                // É manipulado se: É Âncora OU o palpite não é o padrão ["1"]
                return anchors.has(id) || !isDefault;
            }).length;
        }

        function renderGames() {
            const list = document.getElementById('gameList');
            const exclSection = document.getElementById('excludedSection');
            const exclList = document.getElementById('excludedList');
            list.innerHTML = ''; exclList.innerHTML = '';
            
            const now = new Date();
            const limit = new Date();
            limit.setDate(now.getDate() + currentPeriod);
            
            const filtered = allGames.filter(g => {
                const dt = new Date(g.commence_time);
                return dt > now && dt <= limit;
            });

            const mCount = getManipulatedCount();

            let visibleCount = 0;
            filtered.forEach(game => {
                if (excludedGames.has(game.id)) {
                    const item = document.createElement('div');
                    item.className = 'excluded-item';
                    item.innerText = `+ ${game.home_team} x ${game.away_team}`;
                    item.onclick = () => { excludedGames.delete(game.id); renderGames(); };
                    exclList.appendChild(item);
                    return;
                }
                
                visibleCount++;
                const dt = new Date(game.commence_time);
                const isAnchor = anchors.has(game.id);
                // ALERTA LÓGICO: Só mostra o aviso visual se já houver mais de 4 manipulações humanas no total.
                const isFakeAnchor = (mCount > 4) && !isAnchor && (selections[game.id]?.length === 1);

                const row = document.createElement('div');
                row.className = 'game-row';
                row.innerHTML = `
                    <div onclick="toggleAnchor('${game.id}')" class="star-icon ${isAnchor ? 'star-active' : ''}">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"/></svg>
                    </div>
                    <div class="game-time flex flex-col items-center">
                        <span class="text-[9px] text-gray-600 font-bold">${dt.getDate()}/${dt.getMonth()+1}</span>
                        <span class="text-[8px] text-gray-500">${dt.getHours()}:${dt.getMinutes().toString().padStart(2, '0')}</span>
                    </div>
                    <div class="flex-1 min-w-0 flex flex-col gap-1.5">
                        <div class="flex items-center gap-2">
                            <img src="${getShieldUrl(game.home_team)}" class="team-shield-img" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=${game.home_team}'">
                            <span class="team-name truncate-name font-bold ${isAnchor ? 'text-white' : 'text-gray-400'} text-[12px] uppercase tracking-tight">
                                ${game.home_team} ${isFakeAnchor ? '<span class="text-warning ml-1">⚠️</span>' : ''}
                            </span>
                        </div>
                        <div class="flex items-center gap-2">
                            <img src="${getShieldUrl(game.away_team)}" class="team-shield-img" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=${game.away_team}'">
                            <span class="team-name truncate-name font-bold ${isAnchor ? 'text-white' : 'text-gray-400'} text-[12px] uppercase tracking-tight">${game.away_team}</span>
                        </div>
                    </div>
                    <div class="flex gap-1 w-[38%] sm:w-[32%]">
                        <button onclick="toggleBet('${game.id}', '1')" class="btn-bet ${selections[game.id].includes('1') ? 'active-win' : ''}">1</button>
                        <button onclick="toggleBet('${game.id}', 'X')" class="btn-bet ${selections[game.id].includes('X') ? 'active-draw' : ''}">X</button>
                        <button onclick="toggleBet('${game.id}', '2')" class="btn-bet ${selections[game.id].includes('2') ? 'active-win' : ''}">2</button>
                    </div>
                    <button onclick="removeGame('${game.id}')" class="btn-off">
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                `;
                list.appendChild(row);
            });
            
            document.getElementById('gameCount').innerText = `${visibleCount} JOGOS ATIVOS`;
            document.getElementById('anchorCount').innerText = anchors.size;
            if (excludedGames.size > 0) exclSection.classList.remove('hidden'); else exclSection.classList.add('hidden');
        }

        function toggleAnchor(id) { 
            if (anchors.has(id)) anchors.delete(id);
            else if (anchors.size < 4) { anchors.add(id); selections[id] = [selections[id][0]]; }
            renderGames(); 
        }

        function toggleBet(id, v) { 
            if (anchors.has(id)) selections[id] = [v]; 
            else { 
                let c = selections[id]; 
                if (c.includes(v)) { if (c.length > 1) selections[id] = c.filter(x => x !== v); } 
                else selections[id].push(v); 
            } 
            renderGames(); 
        }

        function removeGame(id) { excludedGames.add(id); anchors.delete(id); renderGames(); }

        function resetAllSelections() { 
            selections = {}; 
            allGames.forEach(g => selections[g.id] = ["1"]);
            anchors.clear(); 
            excludedGames.clear(); 
            generatedTickets = [];
            document.getElementById('results').innerHTML = '';
            document.getElementById('shareAllBtn').classList.add('hidden');
            document.getElementById('bet365Btn').classList.add('hidden');
            renderGames(); 
            showToast("RESET REALIZADO");
        }
        
        function setPeriod(d) {
            currentPeriod = d;
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('period-btn-active'));
            document.getElementById('p' + d).classList.add('period-btn-active');
            renderGames();
        }

        function validateBeforeGenerate() {
            if (anchors.size !== 4) { alert("Selecione exatamente 4 Âncoras (Estrelas)."); return; }
            
            const now = new Date();
            const limit = new Date();
            limit.setDate(now.getDate() + currentPeriod);
            
            const mCount = getManipulatedCount();
            const activeGames = allGames.filter(g => {
                const dt = new Date(g.commence_time);
                return dt > now && dt <= limit && !excludedGames.has(g.id);
            });

            const fakes = [];
            // O popup de alerta agora só é verificado se o usuário já manipulou MAIS de 4 jogos.
            if (mCount > 4) {
                activeGames.forEach(game => {
                    if (!anchors.has(game.id) && selections[game.id]?.length === 1) {
                        fakes.push(`${game.home_team} x ${game.away_team}`);
                    }
                });
            }

            if (fakes.length > 0) {
                const list = document.getElementById('fakeAnchorList');
                list.innerHTML = fakes.map(f => `<div class="bg-[#142127] border border-[#1a2e38] p-2 rounded text-[10px] text-warning font-bold uppercase">${f}</div>`).join('');
                document.getElementById('warningModal').style.display = 'flex';
            } else { generateMatrix(); }
        }

        function closeWarning() { document.getElementById('warningModal').style.display = 'none'; }
        function forceGenerate() { closeWarning(); generateMatrix(); }

        function generateMatrix() {
            const invTotal = parseFloat(document.getElementById('investValue').value);
            const qtyReq = parseInt(document.getElementById('ticketQty').value);
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="text-center py-10"><div class="loader mx-auto"></div></div>';
            
            const anchorData = []; const sniperData = [];
            const now = new Date(); const limit = new Date(); limit.setDate(now.getDate() + currentPeriod);

            allGames.filter(g => {
                const dt = new Date(g.commence_time);
                return dt > now && dt <= limit && !excludedGames.has(g.id);
            }).forEach(game => {
                const sels = selections[game.id] || ["1"];
                let odds = { "1": 1.9, "X": 3.1, "2": 2.2 };
                try {
                    const mk = game.bookmakers[0].markets[0].outcomes;
                    odds["1"] = parseFloat(mk.find(o => o.name === game.home_team).price);
                    odds["2"] = parseFloat(mk.find(o => o.name === game.away_team).price);
                    odds["X"] = parseFloat(mk.find(o => o.name === 'Draw').price);
                } catch(e) {}
                const item = { j: `${game.home_team} x ${game.away_team}`, sels, odds, time: new Date(game.commence_time).getTime() };
                if (anchors.has(game.id)) anchorData.push(item);
                else sniperData.push(item);
            });

            generatedTickets = [];
            for (let i = 0; i < qtyReq; i++) {
                const cyclePos = i % 5; let ticketGames = []; let ticketOdd = 1;
                anchorData.forEach((anc, idx) => {
                    let res, odd;
                    if (cyclePos > 0 && (cyclePos - 1) === idx) { res = "X"; odd = anc.odds["X"]; }
                    else { res = anc.sels[0]; odd = anc.odds[res]; }
                    ticketGames.push({ j: anc.j, r: res, o: odd, type: 'ANC', time: anc.time });
                    ticketOdd *= odd;
                });
                sniperData.forEach(snip => {
                    const res = snip.sels[Math.floor(Math.random() * snip.sels.length)];
                    const odd = snip.odds[res];
                    ticketGames.push({ j: snip.j, r: res, o: odd, type: 'SNIP', time: snip.time });
                    ticketOdd *= odd;
                });
                ticketGames.sort((a, b) => a.time - b.time);
                generatedTickets.push({ id: i, odd: ticketOdd, stake: invTotal / qtyReq, games: ticketGames });
            }
            renderTickets(resultsDiv);
            document.getElementById('shareAllBtn').classList.remove('hidden');
            document.getElementById('bet365Btn').classList.remove('hidden');
            window.scrollTo({ top: resultsDiv.offsetTop - 20, behavior: 'smooth' });
        }

        function renderTickets(container) {
            container.innerHTML = `<h2 class="font-bold text-white mb-4 uppercase text-[10px] text-center tracking-widest">RESULTADO SNIPER</h2>`;
            generatedTickets.forEach((t, i) => {
                const card = document.createElement('details'); 
                card.className = "ticket-card";
                let rows = t.games.map(g => `
                    <tr class="ticket-row">
                        <td class="${g.type === 'ANC' ? 'text-anchor' : 'text-sniper'} uppercase">${g.j}</td>
                        <td class="text-right font-black text-white px-2 uppercase">${g.r}</td>
                        <td class="text-right text-[9px] text-gray-600 font-bold">${g.o.toFixed(2)}</td>
                    </tr>
                `).join('');
                card.innerHTML = `
                    <summary class="p-4 flex justify-between items-center bg-[#142127]">
                        <span class="text-[9px] font-black text-white uppercase italic">BILHETE #${i+1}</span>
                        <div class="text-right">
                             <span class="text-[9px] text-gray-500 mr-3 font-bold uppercase">Odd: ${t.odd.toFixed(2)}</span>
                             <span class="text-[10px] text-white font-black">GANHO: <b class="text-[#00e676]">R$ ${(t.stake*t.odd).toFixed(2)}</b></span>
                        </div>
                    </summary>
                    <div class="px-4 pb-4">
                        <table class="w-full mb-4 border-collapse">${rows}</table>
                        <div class="flex gap-2">
                            <button onclick="saveTicketToHistory(${i})" id="s-${i}" class="flex-1 bg-[#1a2e38] text-gray-400 py-3 rounded-xl text-[9px] font-bold uppercase active:scale-95 transition-all">Salvar</button>
                            <button onclick="shareOneTicket(${i})" class="flex-1 bg-[#00e676] text-black py-3 rounded-xl text-[9px] font-black uppercase active:scale-95 transition-all">WhatsApp</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openBet365() { 
            window.open("https://www.bet365.bet.br/?_h=LYe92WD5Yw8_sSM9FtKavg%3D%3D&btsffd=1#/AS/B1/I%5E21/J%5E1/K%5E1/", "_blank"); 
        }

        function formatTicketText(t, i) {
            let text = `🎯 *BILHETE #${i+1}*\n`;
            t.games.forEach(g => {
                const line = `${g.j}: ${g.r} (${g.o.toFixed(2)})`;
                text += g.type === 'ANC' ? `*${line}*\n` : `${line}\n`;
            });
            text += `\n📈 *Odd:* ${t.odd.toFixed(2)} | 💰 *R$ ${(t.stake*t.odd).toFixed(2)}*\n\n`;
            return text;
        }

        function shareOneTicket(idx) {
            const t = generatedTickets[idx];
            const msg = encodeURIComponent(`🚀 *M10BET SNIPER PRO*\n\n${formatTicketText(t, idx)}`);
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        function shareAllTickets() {
            let msg = `🔥 *M10BET SNIPER - MATRIZ COMPLETA*\n━━━━━━━━━━━━━━━\n\n`;
            generatedTickets.forEach((t, i) => msg += formatTicketText(t, i));
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function saveTicketToHistory(idx) {
            const t = generatedTickets[idx];
            const h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const uniqueId = Date.now() + Math.random();
            h.unshift({...t, date: new Date().toISOString(), historyId: uniqueId});
            localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 50)));
            const btn = document.getElementById(`s-${idx}`);
            btn.classList.add('opacity-40', 'pointer-events-none');
            btn.innerText = 'SALVO';
            showToast("BILHETE SALVO");
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const shareBtn = document.getElementById('shareSelectedBtn');
            const empty = document.getElementById('emptyHistory');
            const h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            
            if (h.length === 0) {
                empty.classList.remove('hidden');
                shareBtn.classList.add('hidden');
                list.innerHTML = '';
                return;
            }

            empty.classList.add('hidden');
            shareBtn.classList.remove('hidden');
            list.innerHTML = '';
            
            h.forEach((t, i) => {
                const card = document.createElement('details');
                card.className = "bg-[#0d1518] border border-[#1a2e38] rounded-xl overflow-hidden mb-3";
                card.innerHTML = `
                    <summary class="p-3 flex justify-between items-center bg-[#142127]/50">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" class="history-selector" data-id="${t.historyId}" onclick="event.stopPropagation()">
                            <span class="text-[8px] text-gray-500 uppercase font-black">${new Date(t.date).toLocaleString('pt-BR')}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-[#00e676] text-[10px] font-black">R$ ${(t.stake*t.odd).toFixed(2)}</span>
                            <button onclick="deleteHistoryItem(${i}); event.stopPropagation();" class="text-red-900 font-black px-2 text-xs">✕</button>
                        </div>
                    </summary>
                    <div class="p-3 text-[10px] text-gray-500 space-y-1 uppercase font-medium">
                        ${t.games.map(g => `<div class="flex justify-between border-b border-white/5 py-1.5"><span>${g.j}</span><span class="font-bold text-white">${g.r}</span></div>`).join('')}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function shareSelectedHistory() {
            const checkboxes = document.querySelectorAll('.history-selector:checked');
            if (checkboxes.length === 0) { alert("Selecione bilhetes no histórico primeiro."); return; }
            const h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            let msg = `🔥 *M10BET SNIPER - SELEÇÃO*\n━━━━━━━━━━━━━━━\n\n`;
            checkboxes.forEach((cb, idx) => {
                const id = parseFloat(cb.getAttribute('data-id'));
                const ticket = h.find(item => item.historyId === id);
                if (ticket) msg += formatTicketText(ticket, idx);
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function deleteHistoryItem(index) {
            const h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            h.splice(index, 1);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
            renderHistory();
        }

        function clearFullHistory() {
            if (confirm("Deseja apagar TODO o histórico permanentemente?")) {
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
                showToast("HISTÓRICO LIMPO");
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('opacity-100');
            setTimeout(() => t.classList.remove('opacity-100'), 2000);
        }
    </script>
</body>
</html>
